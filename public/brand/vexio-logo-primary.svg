<svg width="800" height="240" viewBox="0 0 800 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5e7d"/>
      <stop offset="50%" stop-color="#e8173f"/>
      <stop offset="100%" stop-color="#c2001f"/>
    </linearGradient>
    <linearGradient id="grad-slash" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00c8f0"/>
      <stop offset="100%" stop-color="#0080a0"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1018"/>
      <stop offset="100%" stop-color="#060910"/>
    </linearGradient>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="240" fill="url(#bg-grad)" rx="20"/>

  <!-- Ambient red glow -->
  <ellipse cx="90" cy="120" rx="100" ry="80" fill="#e8173f" opacity="0.06"/>

  <!-- Icon: Hex shield -->
  <g transform="translate(30, 32)">
    <!-- Outer hex -->
    <path d="M80 0 L144 36 L144 112 L80 148 L16 112 L16 36 Z"
          fill="none" stroke="url(#grad-main)" stroke-width="4.5" stroke-linejoin="round"
          filter="url(#glow-red)"/>
    <!-- Inner accent ring -->
    <path d="M80 14 L130 42 L130 102 L80 130 L30 102 L30 42 Z"
          fill="none" stroke="#e8173f" stroke-width="1" stroke-linejoin="round" opacity="0.25"/>
    <!-- Bold V letterform -->
    <path d="M36 48 L80 120 L124 48"
          fill="none" stroke="url(#grad-main)" stroke-width="14"
          stroke-linecap="round" stroke-linejoin="round"
          filter="url(#glow-red)"/>
    <!-- Cyan play triangle -->
    <polygon points="66,74 102,88 66,102"
             fill="url(#grad-slash)" filter="url(#glow-cyan)" opacity="0.92"/>
    <!-- Corner sparkle dots -->
    <circle cx="80" cy="8" r="4" fill="#00c8f0" opacity="0.7"/>
    <circle cx="136" cy="44" r="3" fill="#00c8f0" opacity="0.45"/>
    <circle cx="136" cy="104" r="3" fill="#00c8f0" opacity="0.45"/>
    <circle cx="80" cy="140" r="4" fill="#00c8f0" opacity="0.7"/>
    <circle cx="24" cy="104" r="3" fill="#00c8f0" opacity="0.45"/>
    <circle cx="24" cy="44" r="3" fill="#00c8f0" opacity="0.45"/>
  </g>

  <!-- VEXIO Wordmark -->
  <text x="210" y="168"
        font-family="'Bebas Neue', 'Impact', sans-serif"
        font-size="160" letter-spacing="14"
        fill="url(#grad-main)"
        filter="url(#glow-red)">VEXIO</text>

  <!-- Tagline -->
  <text x="212" y="208"
        font-family="'Plus Jakarta Sans', Arial, sans-serif"
        font-size="18" font-weight="700" letter-spacing="8"
        fill="#00c8f0" opacity="0.8">STREAM  ·  ANIME  ·  MOVIES</text>

  <!-- PRO badge -->
  <rect x="666" y="18" width="52" height="22" rx="5" fill="#00c8f0" opacity="0.12"/>
  <rect x="666" y="18" width="52" height="22" rx="5" fill="none" stroke="#00c8f0" stroke-width="1" opacity="0.4"/>
  <text x="692" y="33" text-anchor="middle"
        font-family="'Plus Jakarta Sans', Arial, sans-serif"
        font-size="11" font-weight="800" letter-spacing="2"
        fill="#00c8f0">PRO</text>

  <!-- Decorative line accent -->
  <line x1="210" y1="185" x2="760" y2="185" stroke="#e8173f" stroke-width="0.5" opacity="0.2"/>
</svg>
