<svg width="640" height="128" viewBox="0 0 640 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5e7d"/>
      <stop offset="100%" stop-color="#c2001f"/>
    </linearGradient>
    <linearGradient id="cg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c8f0"/>
      <stop offset="100%" stop-color="#0090b8"/>
    </linearGradient>
    <linearGradient id="cbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1018"/>
      <stop offset="100%" stop-color="#060910"/>
    </linearGradient>
    <filter id="cglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="128" rx="16" fill="url(#cbg)"/>
  <ellipse cx="64" cy="64" rx="72" ry="60" fill="#e8173f" opacity="0.05"/>

  <!-- Mini icon mark -->
  <g transform="translate(18, 12)">
    <path d="M48 0 L86 22 L86 70 L48 92 L10 70 L10 22 Z"
          fill="none" stroke="url(#cg1)" stroke-width="3" stroke-linejoin="round"
          filter="url(#cglow)"/>
    <path d="M22 30 L48 72 L74 30"
          fill="none" stroke="url(#cg1)" stroke-width="8"
          stroke-linecap="round" stroke-linejoin="round"
          filter="url(#cglow)"/>
    <polygon points="38,46 58,52 38,58" fill="url(#cg2)" opacity="0.92"/>
    <!-- Dots -->
    <circle cx="48" cy="6" r="3" fill="#00c8f0" opacity="0.7"/>
    <circle cx="80" cy="28" r="2" fill="#00c8f0" opacity="0.4"/>
    <circle cx="16" cy="28" r="2" fill="#00c8f0" opacity="0.4"/>
  </g>

  <!-- Wordmark -->
  <text x="130" y="96"
        font-family="'Bebas Neue', 'Impact', sans-serif"
        font-size="96" letter-spacing="10"
        fill="url(#cg1)"
        filter="url(#cglow)">VEXIO</text>

  <!-- Vertical rule separator -->
  <line x1="124" y1="20" x2="124" y2="108" stroke="#e8173f" stroke-width="1" opacity="0.25"/>
</svg>
