<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1520"/>
      <stop offset="100%" stop-color="#060910"/>
    </linearGradient>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5e7d"/>
      <stop offset="50%" stop-color="#e8173f"/>
      <stop offset="100%" stop-color="#c2001f"/>
    </linearGradient>
    <linearGradient id="play-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c8f0"/>
      <stop offset="100%" stop-color="#0090b8"/>
    </linearGradient>
    <filter id="glow1" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-outer" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded rect background (app icon shape) -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)"/>

  <!-- Ambient glow bg -->
  <ellipse cx="256" cy="260" rx="200" ry="180" fill="#e8173f" opacity="0.08"/>
  <ellipse cx="256" cy="256" rx="120" ry="120" fill="#e8173f" opacity="0.04"/>

  <!-- Outer hex shield -->
  <path d="M256 52 L432 152 L432 360 L256 460 L80 360 L80 152 Z"
        fill="none" stroke="url(#shield-grad)" stroke-width="9" stroke-linejoin="round"
        filter="url(#glow1)"/>

  <!-- Inner subtle hex ring -->
  <path d="M256 84 L404 168 L404 344 L256 428 L108 344 L108 168 Z"
        fill="none" stroke="#e8173f" stroke-width="1.5" stroke-linejoin="round" opacity="0.2"/>

  <!-- Bold V stroke -->
  <path d="M152 172 L256 360 L360 172"
        fill="none" stroke="url(#shield-grad)" stroke-width="38"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow1)"/>

  <!-- Cyan play triangle -->
  <polygon points="218,240 324,264 218,288"
           fill="url(#play-grad)" filter="url(#glow2)" opacity="0.95"/>

  <!-- Corner sparkle dots -->
  <circle cx="256" cy="60" r="7" fill="#00c8f0" opacity="0.7" filter="url(#glow2)"/>
  <circle cx="424" cy="160" r="5" fill="#00c8f0" opacity="0.5"/>
  <circle cx="424" cy="352" r="5" fill="#00c8f0" opacity="0.5"/>
  <circle cx="256" cy="452" r="7" fill="#00c8f0" opacity="0.7" filter="url(#glow2)"/>
  <circle cx="88" cy="352" r="5" fill="#00c8f0" opacity="0.5"/>
  <circle cx="88" cy="160" r="5" fill="#00c8f0" opacity="0.5"/>
</svg>
